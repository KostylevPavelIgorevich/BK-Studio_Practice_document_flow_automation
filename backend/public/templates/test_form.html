<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестовая форма ГУ-99</title>
    <style>
        body { font-family: 'Times New Roman', serif; padding: 20px; }
        .field-row { margin-bottom: 12px; }
        .field-label { display: inline-block; width: 200px; font-weight: bold; }
        .field-value { display: inline-block; }
    </style>
</head>
<body>
<h1>Тестовая форма ГУ-99</h1>
<div class="field-row">
    <div class="field-label">Поле 1 (текст):</div>
    <div class="field-value">{{ test_field1 }}</div>
</div>
<div class="field-row">
    <div class="field-label">Поле 2 (число):</div>
    <div class="field-value">{{ test_field2 }}</div>
</div>
<div class="field-row">
    <div class="field-label">Поле 3 (дата):</div>
    <div class="field-value">{{ test_date }}</div>
</div>
</body>
</html>
